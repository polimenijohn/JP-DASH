<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashu — Growth Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #060f0d;
    --green: #01de8f;
    --blue: #4a9eff;
    --orange: #f5a623;
    --purple: #a855f7;
    --coral: #ff6b6b;
    --teal: #0b5147;
  }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  canvas { display: block; }

  /* HEADER */
  .hdr {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(6,15,13,0.97), rgba(6,15,13,0));
    pointer-events: none;
  }
  .hdr > * { pointer-events: auto; }
  .hdr-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 44px; height: 44px; background: var(--green); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: var(--teal);
    box-shadow: 0 4px 20px rgba(1,222,143,0.3);
  }
  .hdr-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .hdr-title span { color: var(--green); }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to top, rgba(6,15,13,0.97), rgba(6,15,13,0));
    pointer-events: none;
  }
  .bottom-bar > * { pointer-events: auto; }

  /* LEGEND */
  .legend {
    display: flex; gap: 20px; align-items: center;
  }
  .leg-item { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leg-label { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; }

  /* COUNTER */
  .counter {
    text-align: center;
    background: rgba(1,222,143,0.06);
    border: 1px solid rgba(1,222,143,0.15);
    border-radius: 12px; padding: 10px 24px;
  }
  .counter-val { font-size: 24px; font-weight: 800; color: var(--green); line-height: 1; }
  .counter-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

  /* NAV HINT */
  .nav-hint {
    font-size: 12px; color: rgba(255,255,255,0.25); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .key-badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 8px; border-radius: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
  }

  /* INFO PANEL */
  .panel {
    position: fixed; top: 80px; right: 24px; z-index: 100;
    width: 320px;
    background: rgba(6,15,13,0.94);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 24px;
    backdrop-filter: blur(20px);
    opacity: 0; transform: translateX(16px) scale(0.97);
    transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  .panel.show { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
  .panel-close {
    position: absolute; top: 12px; right: 12px;
    width: 26px; height: 26px; border-radius: 7px;
    background: rgba(255,255,255,0.05); border: none;
    color: rgba(255,255,255,0.35); font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .panel-cat {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .panel-name {
    font-size: 20px; font-weight: 800; color: #fff;
    letter-spacing: -0.3px; margin-bottom: 10px; line-height: 1.2;
  }
  .panel-desc {
    font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.65; margin-bottom: 16px;
  }
  .panel-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .p-stat {
    background: rgba(255,255,255,0.03); border-radius: 9px; padding: 9px 11px;
  }
  .p-stat-v { font-size: 17px; font-weight: 800; color: var(--green); }
  .p-stat-l {
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.25);
  }
  .panel-conns {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .panel-conns-title {
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 6px;
  }
  .panel-conn { font-size: 12px; color: rgba(255,255,255,0.4); padding: 2px 0; }

  /* STEP OVERLAY */
  .step-overlay {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 200;
    text-align: center;
    opacity: 0; transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .step-overlay.show { opacity: 1; }
  .step-num {
    font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--green); margin-bottom: 8px;
    opacity: 0.6;
  }
  .step-text {
    font-size: clamp(28px, 4vw, 48px); font-weight: 800;
    color: #fff; letter-spacing: -1px; line-height: 1.15;
    max-width: 600px;
    text-shadow: 0 4px 40px rgba(0,0,0,0.6);
  }
  .step-text span { color: var(--green); }
  .step-sub {
    font-size: 15px; color: rgba(255,255,255,0.35); margin-top: 12px;
    font-weight: 400; max-width: 420px; margin-left: auto; margin-right: auto;
    line-height: 1.5;
  }
</style>
</head>

  {f:'statement',t:'direct',s:2},{f:'statement',t:'tradeshow',s:1.5},{f:'statement',t:'cpa',s:1},
  {f:'competitor',t:'direct',s:1.5},{f:'competitor',t:'iso',s:1},
  {f:'roi',t:'seo',s:1.5},{f:'roi',t:'cpa',s:1},{f:'roi',t:'direct',s:1},
  {f:'onepager',t:'direct',s:1.5},{f:'onepager',t:'vertical',s:1.5},
  {f:'sequences',t:'direct',s:1.5},{f:'sequences',t:'mrp',s:1.5},
  {f:'objection',t:'direct',s:1},{f:'objection',t:'mrp',s:1},
  {f:'intake',t:'seo',s:1},{f:'intake',t:'direct',s:1},
  {f:'residual',t:'mrp',s:1.5},{f:'residual',t:'cpa',s:1},{f:'residual',t:'insurance',s:1},
  {f:'pepitch',t:'pe',s:1.5},
  // Infra -> Channels/Goal
  {f:'vapi',t:'goal',s:3},{f:'vapi',t:'mrp',s:1},{f:'vapi',t:'direct',s:1},{f:'vapi',t:'cpa',s:1},{f:'vapi',t:'bank',s:1},
  {f:'ghl',t:'goal',s:2},{f:'ghl',t:'direct',s:1},{f:'ghl',t:'mrp',s:1},
  {f:'automations',t:'goal',s:1.5},
  {f:'dash',t:'goal',s:1},{f:'dealvel',t:'goal',s:1},
  {f:'scorecard',t:'mrp',s:1},{f:'dream100',t:'direct',s:1},{f:'playbook',t:'direct',s:1},
  // Cross-connections
  {f:'mrp',t:'network',s:1},{f:'cpa',t:'network',s:1},
  {f:'bni',t:'mrp',s:1},{f:'vertical',t:'assoc',s:1},{f:'bank',t:'franchise',s:1},{f:'iso',t:'portfolio',s:1},
  {f:'mca',t:'iso',s:0.8},
];

// Build lookup
const NM = {};
nodes.forEach(n => { NM[n.id] = n; n.x = n.fx; n.y = n.fy; });

// ── PARTICLES ──
// Flowing dots along edges toward the goal
const particles = [];
const MAX_P = 200;
function spawnParticle() {
  if (particles.length >= MAX_P) return;
  // Pick a random edge that connects toward goal or toward an outcome
  const goalEdges = edges.filter(e => e.t === 'goal' || NM[e.t]?.type === 'outcome');
  const e = goalEdges[Math.floor(Math.random() * goalEdges.length)];
  const from = NM[e.f], to = NM[e.t];
  if (!from || !to) return;
  particles.push({
    x: from.x, y: from.y,
    tx: to.x, ty: to.y,
    progress: 0,
    speed: 0.003 + Math.random() * 0.004,
    color: COL[from.type],
    size: 1.5 + Math.random() * 2,
    alpha: 0
  });
}

// ── PRESENTATION STEPS ──
const steps = [
  { num: '', text: '', sub: '', highlight: [], dim: true }, // step 0 = full view
  { num: 'The Goal', text: '<span>2,000</span> Merchants\nin 6 Months', sub: '$120M/month in volume. $1.4B annually.', highlight: ['goal'], dim: true },
  { num: 'Tier 1 Channels', text: '<span>1,300</span> from\nFour Core Channels', sub: 'MRP Network, Direct Outreach, CPA Referrals, ISO Partnerships. All live or launching Month 1.', highlight: ['mrp','direct','cpa','iso','goal'], dim: true },
  { num: 'Tier 2 Channels', text: '<span>850</span> from\nStrategic Partners', sub: 'Banks, verticals, MCA, insurance, payroll, trade shows. Month 2-3 ramp.', highlight: ['bank','vertical','mca','insurance','payroll','tradeshow','goal'], dim: true },
  { num: 'Tier 3 Channels', text: '<span>550</span> from\nCompounding Plays', sub: 'Franchise groups, portfolio buys, associations, PE, BNI, SaaS, SEO. Month 3+ snowball.', highlight: ['franchise','portfolio','assoc','pe','bni','saas','seo','goal'], dim: true },
  { num: 'Sales Arsenal', text: '<span>9</span> Tools\nAlready Built', sub: 'Statement analyzer, competitor tool, ROI calc, sequences, objection handler, intake form, one-pagers, PE pitch, residual calc.', highlight: ['statement','competitor','roi','sequences','onepager','objection','intake','residual','pepitch'], dim: true },
  { num: 'Infrastructure', text: 'The Machine\nRuns <span>24/7</span>', sub: 'AI voice closer, CRM, daily automations, dashboard, deal tracker, partner scorecard, playbook, Dream 100.', highlight: ['vapi','ghl','automations','dash','dealvel','scorecard','playbook','dream100'], dim: true },
  { num: 'The Unlock', text: 'AI Closes\n<span>23+ Calls/Day</span>', sub: 'Voice clone handles standard calls. John handles whales and escalations. Every channel scales without adding headcount.', highlight: ['vapi','goal','mrp','direct','cpa','bank'], dim: true },
  { num: 'The Outcome', text: '<span>$1.4B</span> in Volume\nThen Cross-Sell', sub: 'Every processing merchant becomes a C2C opportunity. The network self-grows. Two revenue lines on one base.', highlight: ['goal','volume','c2c','network'], dim: true },
  { num: 'The Opportunity', text: 'This System\nis <span>Replicable</span>', sub: 'Every bank, ISO, and fund Adam knows could plug into this. The playbook, tools, and infrastructure work for any partner who brings merchants.', highlight: [], dim: false },
];

let currentStep = 0;
let stepFade = 0;
let highlightSet = new Set();
let dimMode = false;

function goToStep(idx) {
  currentStep = Math.max(0, Math.min(steps.length - 1, idx));
  const step = steps[currentStep];
  const overlay = document.getElementById('stepOverlay');

  if (currentStep === 0) {
    overlay.classList.remove('show');
    highlightSet.clear();
    dimMode = false;
    return;
  }

  document.getElementById('stepNum').textContent = step.num;
  document.getElementById('stepText').innerHTML = step.text;
  document.getElementById('stepSub').textContent = step.sub;
  overlay.classList.add('show');
  highlightSet = new Set(step.highlight);
  dimMode = step.dim;
}

// ── CAMERA ──
let cam = { x: 0, y: 0, z: 1 };
let tCam = { x: 0, y: 0, z: 1 };
let drag = false, dStart = {x:0,y:0}, cStart = {x:0,y:0};
let hovered = null, selected = null;
let t = 0;

// ── DRAWING ──
function getAlpha(node) {
  if (!dimMode) return 1;
  if (highlightSet.size === 0) return 1;
  if (highlightSet.has(node.id)) return 1;
  return 0.08;
}
function getEdgeAlpha(e) {
  if (selected) {
    if (e.f === selected.id || e.t === selected.id) return 0.5;
    return 0.02;
  }
  if (!dimMode) return 0.1;
  if (highlightSet.size === 0) return 0.1;
  if (highlightSet.has(e.f) && highlightSet.has(e.t)) return 0.35;
  if (highlightSet.has(e.f) || highlightSet.has(e.t)) return 0.08;
  return 0.02;
}

function drawEdgeCurved(ax, ay, bx, by, alpha, strength) {
  // Slight curve via midpoint offset
  const mx = (ax + bx) / 2;
  const my = (ay + by) / 2;
  const dx = bx - ax, dy = by - ay;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  // perpendicular offset proportional to distance
  const off = len * 0.06;
  const cx = mx + (-dy/len) * off;
  const cy = my + (dx/len) * off;

  X.beginPath();
  X.moveTo(ax, ay);
  X.quadraticCurveTo(cx, cy, bx, by);
  X.strokeStyle = hex('#01de8f', alpha);
  X.lineWidth = (strength * 0.8) / cam.z;
  X.stroke();
}

function render() {
  t += 0.008;

  // Smooth camera
  cam.x += (tCam.x - cam.x) * 0.08;
  cam.y += (tCam.y - cam.y) * 0.08;
  cam.z += (tCam.z - cam.z) * 0.08;

  // Spawn particles
  if (Math.random() < 0.3) spawnParticle();

  X.clearRect(0, 0, W, H);

  // Subtle background grid
  X.save();
  X.translate(W/2 + cam.x, H/2 + cam.y);
  X.scale(cam.z, cam.z);

  // Ambient glow at center
  const cg = X.createRadialGradient(0, 0, 0, 0, 0, 500);
  cg.addColorStop(0, 'rgba(1,222,143,0.03)');
  cg.addColorStop(1, 'transparent');
  X.fillStyle = cg;
  X.fillRect(-800, -800, 1600, 1600);

  // Draw ring guides (subtle)
  [220, 380, 480].forEach((r, i) => {
    X.beginPath();
    X.arc(0, 0, r, 0, Math.PI * 2);
    X.strokeStyle = `rgba(255,255,255,${dimMode && highlightSet.size > 0 ? 0.01 : 0.02})`;
    X.lineWidth = 1 / cam.z;
    X.setLineDash([4/cam.z, 8/cam.z]);
    X.stroke();
    X.setLineDash([]);
  });

  // Draw edges
  edges.forEach(e => {
    const a = NM[e.f], b = NM[e.t];
    if (!a || !b) return;
    const alpha = getEdgeAlpha(e);
    drawEdgeCurved(a.x, a.y, b.x, b.y, alpha, e.s);
  });

  // Draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.progress += p.speed;

    // Ease in/out alpha
    if (p.progress < 0.1) p.alpha = p.progress / 0.1;
    else if (p.progress > 0.85) p.alpha = (1 - p.progress) / 0.15;
    else p.alpha = 1;

    if (p.progress >= 1) { particles.splice(i, 1); continue; }

    const ease = p.progress; // linear for now
    p.x = p.x + (p.tx - (p.x - (p.tx - p.x) * (1 - ease) / ease || p.x)) * p.speed;
    // simpler: lerp
    const lx = NM[edges[0]?.f]?.x || 0; // skip, just use direct lerp
    const px = p.x + (p.tx - p.x) * p.speed * 2;
    const py = p.y + (p.ty - p.y) * p.speed * 2;
    p.x = px; p.y = py;

    const finalAlpha = p.alpha * (dimMode && highlightSet.size > 0 ? 0.15 : 0.6);
    X.beginPath();
    X.arc(p.x, p.y, p.size / cam.z, 0, Math.PI * 2);
    X.fillStyle = hex(p.color, finalAlpha);
    X.fill();

    // Glow trail
    const tg = X.createRadialGradient(p.x, p.y, 0, p.x, p.y, (p.size * 4) / cam.z);
    tg.addColorStop(0, hex(p.color, finalAlpha * 0.3));
    tg.addColorStop(1, 'transparent');
    X.fillStyle = tg;
    X.beginPath();
    X.arc(p.x, p.y, (p.size * 4) / cam.z, 0, Math.PI * 2);
    X.fill();
  }

  // Draw nodes
  nodes.forEach(node => {
    const alpha = getAlpha(node);
    const col = COL[node.type];
    const isH = hovered === node;
    const isS = selected === node;
    const r = node.r * (isH ? 1.06 : 1);

    // Outer glow for highlighted/hovered
    if ((isH || isS || (highlightSet.has(node.id) && dimMode)) && alpha > 0.5) {
      const gg = X.createRadialGradient(node.x, node.y, r * 0.8, node.x, node.y, r * 2.2);
      gg.addColorStop(0, hex(col, 0.12));
      gg.addColorStop(1, 'transparent');
      X.fillStyle = gg;
      X.beginPath();
      X.arc(node.x, node.y, r * 2.2, 0, Math.PI * 2);
      X.fill();
    }

    // Goal pulse rings
    if (node.id === 'goal') {
      for (let ring = 0; ring < 3; ring++) {
        const phase = (t * 1.5 + ring * 0.7) % 2;
        if (phase > 1) continue;
        const pr = r + phase * 40;
        const pa = (1 - phase) * 0.12 * alpha;
        X.beginPath();
        X.arc(node.x, node.y, pr, 0, Math.PI * 2);
        X.strokeStyle = hex(col, pa);
        X.lineWidth = 2 / cam.z;
        X.stroke();
      }
    }

    // Glass fill
    const bg = X.createRadialGradient(node.x, node.y - r * 0.3, r * 0.1, node.x, node.y, r);
    bg.addColorStop(0, hex(col, alpha * (node.type === 'goal' ? 0.25 : 0.12)));
    bg.addColorStop(1, hex(col, alpha * (node.type === 'goal' ? 0.08 : 0.04)));
    X.beginPath();
    X.arc(node.x, node.y, r, 0, Math.PI * 2);
    X.fillStyle = bg;
    X.fill();

    // Border
    X.strokeStyle = hex(col, alpha * (isS ? 0.85 : isH ? 0.6 : 0.3));
    X.lineWidth = (isS ? 2.5 : isH ? 2 : 1.2) / cam.z;
    X.stroke();

    // Label
    const lines = node.label.split('\n');
    const fs = Math.max(9, Math.min(r * 0.3, 15));
    X.font = `700 ${fs}px 'DM Sans', sans-serif`;
    X.textAlign = 'center';
    X.textBaseline = 'middle';

    const hasSubtext = node.sub && node.sub.length > 0;
    const totalHeight = lines.length * fs * 1.2 + (hasSubtext ? fs * 0.9 : 0);
    const startY = node.y - totalHeight / 2 + fs * 0.6;

    X.fillStyle = hex(col, alpha * 0.95);
    lines.forEach((line, i) => {
      X.fillText(line, node.x, startY + i * fs * 1.2);
    });

    // Sub-label (merchant count or descriptor)
    if (hasSubtext) {
      const subFs = Math.max(8, fs * 0.75);
      X.font = `800 ${subFs}px 'DM Sans', sans-serif`;
      X.fillStyle = hex('#ffffff', alpha * 0.55);
      X.fillText(node.sub, node.x, startY + lines.length * fs * 1.2 + 2);
    }
  });

  // Selected node edge highlights
  if (selected) {
    edges.forEach(e => {
      if (e.f !== selected.id && e.t !== selected.id) return;
      const a = NM[e.f], b = NM[e.t];
      if (!a || !b) return;
      drawEdgeCurved(a.x, a.y, b.x, b.y, 0.45, e.s * 1.5);
    });
  }

  X.restore();
  requestAnimationFrame(render);
}

// ── INTERACTION ──
function s2w(sx, sy) {
  return { x: (sx - W/2 - cam.x) / cam.z, y: (sy - H/2 - cam.y) / cam.z };
}
function hit(mx, my) {
  const {x, y} = s2w(mx, my);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = x - n.x, dy = y - n.y;
    if (dx*dx + dy*dy < n.r*n.r) return n;
  }
  return null;
}

C.addEventListener('mousedown', e => {
  const n = hit(e.clientX, e.clientY);
  if (n) { selectNode(n); }
  else { drag = true; dStart = {x:e.clientX,y:e.clientY}; cStart = {x:tCam.x,y:tCam.y}; closePanel(); }
});
C.addEventListener('mousemove', e => {
  if (drag) { tCam.x = cStart.x + (e.clientX - dStart.x); tCam.y = cStart.y + (e.clientY - dStart.y); }
  else { const n = hit(e.clientX, e.clientY); hovered = n; C.style.cursor = n ? 'pointer' : 'grab'; }
});
C.addEventListener('mouseup', () => drag = false);
C.addEventListener('mouseleave', () => { drag = false; hovered = null; });
C.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? 0.92 : 1.08;
  tCam.z = Math.max(0.25, Math.min(3, tCam.z * d));
}, { passive: false });

// Touch
let lastTD = 0;
C.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const tc = e.touches[0];
    const n = hit(tc.clientX, tc.clientY);
    if (n) selectNode(n);
    else { drag = true; dStart = {x:tc.clientX,y:tc.clientY}; cStart = {x:tCam.x,y:tCam.y}; }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTD = Math.sqrt(dx*dx+dy*dy);
  }
}, {passive:true});
C.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && drag) {
    const tc = e.touches[0];
    tCam.x = cStart.x + (tc.clientX - dStart.x);
    tCam.y = cStart.y + (tc.clientY - dStart.y);
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx*dx+dy*dy);
    tCam.z = Math.max(0.25, Math.min(3, tCam.z * (d/lastTD)));
    lastTD = d;
  }
}, {passive:false});
C.addEventListener('touchend', () => drag = false);

// Keyboard -- presentation mode
addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); goToStep(currentStep + 1); }
  if (e.code === 'ArrowRight') { e.preventDefault(); goToStep(currentStep + 1); }
  if (e.code === 'ArrowLeft') { e.preventDefault(); goToStep(currentStep - 1); }
  if (e.code === 'Escape') { goToStep(0); closePanel(); }
});

function selectNode(node) {
  // If in presentation mode, exit it
  if (currentStep > 0) goToStep(0);

  selected = node;
  const typeLabels = {goal:'Core Target',channel:'Distribution Channel',tool:'Sales Tool',infra:'Infrastructure',outcome:'Outcome'};
  document.getElementById('pCat').textContent = typeLabels[node.type];
  document.getElementById('pCat').style.color = COL[node.type];
  document.getElementById('pName').textContent = node.label.replace('\n',' ');
  document.getElementById('pDesc').textContent = node.desc;

  const se = document.getElementById('pStats');
  se.innerHTML = '';
  (node.stats||[]).forEach(s => {
    se.innerHTML += `<div class="p-stat"><div class="p-stat-v">${s.v}</div><div class="p-stat-l">${s.l}</div></div>`;
  });

  const cl = document.getElementById('pConnList');
  cl.innerHTML = '';
  const conns = [];
  edges.forEach(e => {
    if (e.f === node.id && NM[e.t]) conns.push(NM[e.t]);
    if (e.t === node.id && NM[e.f]) conns.push(NM[e.f]);
  });
  // Dedupe
  const seen = new Set();
  conns.forEach(c => {
    if (seen.has(c.id)) return;
    seen.add(c.id);
    cl.innerHTML += `<div class="panel-conn" style="color:${COL[c.type]}">${c.label.replace('\n',' ')}</div>`;
  });

  document.getElementById('panel').classList.add('show');
}

function closePanel() {
  document.getElementById('panel').classList.remove('show');
  selected = null;
}

// Init zoom
tCam.z = Math.min(W, H) / 1300;
cam.z = tCam.z;

render();
</script>
