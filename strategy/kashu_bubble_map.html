<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashu — Growth Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #060f0d;
    --green: #01de8f;
    --blue: #4a9eff;
    --orange: #f5a623;
    --purple: #a855f7;
    --coral: #ff6b6b;
    --teal: #0b5147;
  }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  canvas { display: block; }

  .hdr {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(6,15,13,0.97) 0%, rgba(6,15,13,0) 100%);
    pointer-events: none;
  }
  .hdr > * { pointer-events: auto; }
  .hdr-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 44px; height: 44px; background: var(--green); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: var(--teal);
    box-shadow: 0 4px 20px rgba(1,222,143,0.3);
  }
  .hdr-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .hdr-title span { color: var(--green); }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to top, rgba(6,15,13,0.97) 0%, rgba(6,15,13,0) 100%);
    pointer-events: none;
  }
  .bottom-bar > * { pointer-events: auto; }

  .legend { display: flex; gap: 20px; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leg-label { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; }

  .counter {
    text-align: center;
    background: rgba(1,222,143,0.06);
    border: 1px solid rgba(1,222,143,0.15);
    border-radius: 12px; padding: 10px 24px;
  }
  .counter-val { font-size: 24px; font-weight: 800; color: var(--green); line-height: 1; }
  .counter-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

  .nav-hint {
    font-size: 12px; color: rgba(255,255,255,0.25); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .key-badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 8px; border-radius: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
  }

  /* INFO PANEL */
  .panel {
    position: fixed; top: 80px; right: 24px; z-index: 100;
    width: 320px;
    background: rgba(6,15,13,0.94);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 24px;
    backdrop-filter: blur(20px);
    opacity: 0; transform: translateX(16px) scale(0.97);
    transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  .panel.show { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
  .panel-close {
    position: absolute; top: 12px; right: 12px;
    width: 26px; height: 26px; border-radius: 7px;
    background: rgba(255,255,255,0.05); border: none;
    color: rgba(255,255,255,0.35); font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .panel-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .panel-name { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.3px; margin-bottom: 10px; line-height: 1.2; }
  .panel-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.65; margin-bottom: 16px; }
  .panel-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .p-stat { background: rgba(255,255,255,0.03); border-radius: 9px; padding: 9px 11px; }
  .p-stat-v { font-size: 17px; font-weight: 800; color: var(--green); }
  .p-stat-l { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
  .panel-conns { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
  .panel-conns-title { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 6px; }
  .panel-conn { font-size: 12px; color: rgba(255,255,255,0.4); padding: 2px 0; }

  /* STEP CARD -- bottom left, not center */
  .step-card {
    position: fixed;
    bottom: 80px;
    left: 32px;
    z-index: 200;
    max-width: 440px;
    background: rgba(6,15,13,0.92);
    border: 1px solid rgba(1,222,143,0.15);
    border-radius: 18px;
    padding: 28px 32px;
    backdrop-filter: blur(24px);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  .step-card.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .step-num {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--green); margin-bottom: 8px;
    opacity: 0.7;
  }
  .step-text {
    font-size: 32px; font-weight: 800;
    color: #fff; letter-spacing: -0.8px; line-height: 1.15;
  }
  .step-text span { color: var(--green); }
  .step-sub {
    font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 10px;
    font-weight: 400; line-height: 1.55;
  }
  .step-progress {
    display: flex; gap: 4px; margin-top: 16px;
  }
  .step-dot {
    width: 24px; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transition: background 0.3s;
  }
  .step-dot.active { background: var(--green); }
  .step-dot.past { background: rgba(1,222,143,0.3); }
</style>
</head>

  {f:'pepitch',t:'pe',s:1},
  {f:'vapi',t:'goal',s:3},{f:'vapi',t:'mrp',s:1},{f:'vapi',t:'direct',s:1},
  {f:'ghl',t:'goal',s:2},{f:'ghl',t:'direct',s:0.8},{f:'ghl',t:'mrp',s:0.8},
  {f:'automations',t:'goal',s:1.5},
  {f:'dash',t:'goal',s:0.8},{f:'dealvel',t:'goal',s:0.8},
  {f:'scorecard',t:'mrp',s:0.8},{f:'dream100',t:'direct',s:0.8},{f:'playbook',t:'direct',s:0.8},
  {f:'mrp',t:'network',s:1},{f:'cpa',t:'network',s:1},
  {f:'bni',t:'mrp',s:0.8},{f:'vertical',t:'assoc',s:0.8},{f:'bank',t:'franchise',s:0.8},{f:'iso',t:'portfolio',s:0.8},
];

const NM = {};
nodes.forEach(n => { NM[n.id] = n; n.x = n.fx; n.y = n.fy; });

// ── PARTICLES ──
const particles = [];
function spawnParticle() {
  if (particles.length >= 120) return;
  const goalEdges = edges.filter(e => e.t === 'goal' || NM[e.t]?.type === 'outcome');
  const e = goalEdges[Math.floor(Math.random() * goalEdges.length)];
  const from = NM[e.f], to = NM[e.t];
  if (!from || !to) return;
  particles.push({
    sx: from.x, sy: from.y, tx: to.x, ty: to.y,
    p: 0, speed: 0.004 + Math.random() * 0.005,
    color: COL[from.type], size: 1.5 + Math.random() * 1.5
  });
}

// ── STEPS ──
const steps = [
  { num:'', text:'', sub:'', hl:[], dim:false },
  { num:'The Goal', text:'<span>2,000</span> Merchants in 6 Months', sub:'$120M/month in volume. $1.4B annually. Every node feeds this number.', hl:['goal'], dim:true },
  { num:'Tier 1 -- Launch Now', text:'<span>1,300</span> from Four Core Channels', sub:'MRP Network, Direct Outreach, CPAs, ISO Partnerships. All live or Month 1.', hl:['mrp','direct','cpa','iso','goal'], dim:true },
  { num:'Tier 2 -- Strategic Ramp', text:'<span>850</span> from Strategic Partners', sub:'Banks, verticals, MCA, insurance, payroll, trade shows. Month 2-3.', hl:['bank','vertical','mca','insurance','payroll','tradeshow','goal'], dim:true },
  { num:'Tier 3 -- Compounding', text:'<span>550</span> from Compounding Plays', sub:'Franchise groups, portfolio buys, associations, PE, BNI, SaaS, SEO.', hl:['franchise','portfolio','assoc','pe','bni','saas','seo','goal'], dim:true },
  { num:'Sales Arsenal', text:'<span>9</span> Tools Already Built', sub:'Statement analyzer, competitor tool, ROI calc, sequences, objections, intake, one-pagers, PE pitch, residual calc.', hl:['statement','competitor','roi','sequences','onepager','objection','intake','residual','pepitch'], dim:true },
  { num:'Infrastructure', text:'The Machine Runs <span>24/7</span>', sub:'AI closer, CRM, automations, dashboard, deal tracker, partner scorecard, playbook, Dream 100.', hl:['vapi','ghl','automations','dash','dealvel','scorecard','playbook','dream100'], dim:true },
  { num:'The Unlock', text:'AI Closes <span>23+</span> Calls/Day', sub:'Voice clone handles standard calls. John handles whales. Every channel scales without headcount.', hl:['vapi','goal','mrp','direct','cpa','bank'], dim:true },
  { num:'The Outcome', text:'<span>$1.4B</span> Then Cross-Sell', sub:'Every processing merchant becomes a C2C opportunity. Two revenue lines on one base.', hl:['goal','volume','c2c','network'], dim:true },
  { num:'For Adam', text:'This System is <span>Replicable</span>', sub:'Every bank, ISO, and fund in your network could plug into this. The playbook works for anyone who brings merchants.', hl:[], dim:false },
];

let curStep = 0;
let hlSet = new Set();
let dimOn = false;

function goToStep(idx) {
  curStep = Math.max(0, Math.min(steps.length-1, idx));
  const s = steps[curStep];
  const card = document.getElementById('stepCard');

  if (curStep === 0) {
    card.classList.remove('show');
    hlSet.clear(); dimOn = false;
    return;
  }

  document.getElementById('stepNum').textContent = s.num;
  document.getElementById('stepText').innerHTML = s.text;
  document.getElementById('stepSub').textContent = s.sub;

  // Progress dots
  const prog = document.getElementById('stepProgress');
  prog.innerHTML = '';
  for (let i = 1; i < steps.length; i++) {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i === curStep ? ' active' : i < curStep ? ' past' : '');
    prog.appendChild(d);
  }

  card.classList.add('show');
  hlSet = new Set(s.hl);
  dimOn = s.dim;
}

// ── CAMERA ──
let cam = {x:0,y:0,z:1}, tCam = {x:0,y:0,z:1};
let drag=false, dS={x:0,y:0}, cS={x:0,y:0};
let hovered=null, selected=null;
let t=0;

function getAlpha(n) {
  if (!dimOn) return 1;
  if (hlSet.size===0) return 1;
  return hlSet.has(n.id) ? 1 : 0.04;
}
function getEA(e) {
  if (selected) return (e.f===selected.id||e.t===selected.id) ? 0.4 : 0.015;
  if (!dimOn) return 0.07;
  if (hlSet.size===0) return 0.07;
  if (hlSet.has(e.f)&&hlSet.has(e.t)) return 0.3;
  return 0.01;
}

function drawEdge(ax,ay,bx,by,alpha,s) {
  const mx=(ax+bx)/2, my=(ay+by)/2;
  const dx=bx-ax, dy=by-ay, len=Math.sqrt(dx*dx+dy*dy)||1;
  const off=len*0.05;
  const cx=mx+(-dy/len)*off, cy=my+(dx/len)*off;
  X.beginPath();
  X.moveTo(ax,ay);
  X.quadraticCurveTo(cx,cy,bx,by);
  X.strokeStyle = hex('#01de8f', alpha);
  X.lineWidth = Math.max(0.5, s*0.6) / cam.z;
  X.stroke();
}

function render() {
  t += 0.008;
  cam.x+=(tCam.x-cam.x)*0.08;
  cam.y+=(tCam.y-cam.y)*0.08;
  cam.z+=(tCam.z-cam.z)*0.08;

  if (Math.random()<0.2) spawnParticle();

  X.clearRect(0,0,W,H);
  X.save();
  X.translate(W/2+cam.x, H/2+cam.y);
  X.scale(cam.z,cam.z);

  // Ambient center glow
  const cg = X.createRadialGradient(0,0,0,0,0,600);
  cg.addColorStop(0,'rgba(1,222,143,0.025)');
  cg.addColorStop(1,'transparent');
  X.fillStyle=cg;
  X.fillRect(-900,-900,1800,1800);

  // Edges
  edges.forEach(e => {
    const a=NM[e.f], b=NM[e.t];
    if (!a||!b) return;
    drawEdge(a.x,a.y,b.x,b.y,getEA(e),e.s);
  });

  // Particles
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.p += p.speed;
    if (p.p>=1) { particles.splice(i,1); continue; }
    // Smooth lerp
    const ease = p.p;
    const px = p.sx + (p.tx-p.sx)*ease;
    const py = p.sy + (p.ty-p.sy)*ease;
    // Fade in/out
    let a = 1;
    if (p.p<0.15) a=p.p/0.15;
    else if (p.p>0.8) a=(1-p.p)/0.2;
    const fa = a * (dimOn&&hlSet.size>0 ? 0.08 : 0.4);
    X.beginPath();
    X.arc(px,py,p.size/cam.z,0,Math.PI*2);
    X.fillStyle=hex(p.color,fa);
    X.fill();
  }

  // Nodes
  nodes.forEach(node => {
    const alpha = getAlpha(node);
    if (alpha < 0.02) return; // don't draw invisible nodes
    const col = COL[node.type];
    const isH = hovered===node, isS = selected===node;
    const r = node.r * (isH?1.05:1);

    // Glow for active nodes
    if ((isH||isS||(hlSet.has(node.id)&&dimOn)) && alpha>0.5) {
      const gg = X.createRadialGradient(node.x,node.y,r*0.5,node.x,node.y,r*2);
      gg.addColorStop(0,hex(col,0.1));
      gg.addColorStop(1,'transparent');
      X.fillStyle=gg;
      X.beginPath();
      X.arc(node.x,node.y,r*2,0,Math.PI*2);
      X.fill();
    }

    // Goal pulse
    if (node.id==='goal' && alpha>0.5) {
      for (let ring=0;ring<2;ring++) {
        const phase=(t*1.2+ring*0.8)%2;
        if (phase>1) continue;
        X.beginPath();
        X.arc(node.x,node.y,r+phase*50,0,Math.PI*2);
        X.strokeStyle=hex(col,(1-phase)*0.08*alpha);
        X.lineWidth=1.5/cam.z;
        X.stroke();
      }
    }

    // Fill
    const bg = X.createRadialGradient(node.x,node.y-r*0.3,r*0.1,node.x,node.y,r);
    bg.addColorStop(0,hex(col,alpha*(node.type==='goal'?0.22:0.1)));
    bg.addColorStop(1,hex(col,alpha*(node.type==='goal'?0.06:0.03)));
    X.beginPath();
    X.arc(node.x,node.y,r,0,Math.PI*2);
    X.fillStyle=bg;
    X.fill();

    // Border
    X.strokeStyle=hex(col,alpha*(isS?0.8:isH?0.55:0.25));
    X.lineWidth=(isS?2.5:isH?2:1)/cam.z;
    X.stroke();

    // Label -- BIGGER text, with shadow for readability
    const lines = node.label.split('\n');
    const fs = Math.max(11, Math.min(r*0.34, 18));
    X.font = `700 ${fs}px 'DM Sans', sans-serif`;
    X.textAlign='center';
    X.textBaseline='middle';

    const hasSub = node.sub && node.sub.length>0;
    const totalH = lines.length*fs*1.25 + (hasSub?fs*0.85:0);
    const startY = node.y - totalH/2 + fs*0.6;

    // Text shadow for readability
    X.shadowColor = 'rgba(0,0,0,0.6)';
    X.shadowBlur = 6;
    X.fillStyle=hex(col, alpha*0.95);
    lines.forEach((line,i) => {
      X.fillText(line, node.x, startY+i*fs*1.25);
    });

    if (hasSub) {
      const sf = Math.max(9, fs*0.7);
      X.font = `800 ${sf}px 'DM Sans', sans-serif`;
      X.fillStyle = hex('#ffffff', alpha*0.5);
      X.fillText(node.sub, node.x, startY+lines.length*fs*1.25+2);
    }
    X.shadowColor='transparent';
    X.shadowBlur=0;
  });

  // Selected edge highlights
  if (selected) {
    edges.forEach(e => {
      if (e.f!==selected.id&&e.t!==selected.id) return;
      const a=NM[e.f], b=NM[e.t];
      if (!a||!b) return;
      drawEdge(a.x,a.y,b.x,b.y,0.4,e.s*1.5);
    });
  }

  X.restore();
  requestAnimationFrame(render);
}

// ── INPUT ──
function s2w(sx,sy) { return {x:(sx-W/2-cam.x)/cam.z, y:(sy-H/2-cam.y)/cam.z}; }
function hit(mx,my) {
  const {x,y}=s2w(mx,my);
  for (let i=nodes.length-1;i>=0;i--) {
    const n=nodes[i]; const dx=x-n.x,dy=y-n.y;
    if (dx*dx+dy*dy<n.r*n.r) return n;
  }
  return null;
}

C.addEventListener('mousedown',e=>{
  const n=hit(e.clientX,e.clientY);
  if(n){selectNode(n);}
  else{drag=true;dS={x:e.clientX,y:e.clientY};cS={x:tCam.x,y:tCam.y};closePanel();}
});
C.addEventListener('mousemove',e=>{
  if(drag){tCam.x=cS.x+(e.clientX-dS.x);tCam.y=cS.y+(e.clientY-dS.y);}
  else{const n=hit(e.clientX,e.clientY);hovered=n;C.style.cursor=n?'pointer':'grab';}
});
C.addEventListener('mouseup',()=>drag=false);
C.addEventListener('mouseleave',()=>{drag=false;hovered=null;});
C.addEventListener('wheel',e=>{
  e.preventDefault();
  tCam.z=Math.max(0.2,Math.min(3,tCam.z*(e.deltaY>0?0.92:1.08)));
},{passive:false});

let lastTD=0;
C.addEventListener('touchstart',e=>{
  if(e.touches.length===1){const tc=e.touches[0];const n=hit(tc.clientX,tc.clientY);if(n)selectNode(n);else{drag=true;dS={x:tc.clientX,y:tc.clientY};cS={x:tCam.x,y:tCam.y};}}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;lastTD=Math.sqrt(dx*dx+dy*dy);}
},{passive:true});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){const tc=e.touches[0];tCam.x=cS.x+(tc.clientX-dS.x);tCam.y=cS.y+(tc.clientY-dS.y);}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);tCam.z=Math.max(0.2,Math.min(3,tCam.z*(d/lastTD)));lastTD=d;}
},{passive:false});
C.addEventListener('touchend',()=>drag=false);

addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();goToStep(curStep+1);}
  if(e.code==='ArrowRight'){e.preventDefault();goToStep(curStep+1);}
  if(e.code==='ArrowLeft'){e.preventDefault();goToStep(curStep-1);}
  if(e.code==='Escape'){goToStep(0);closePanel();}
});

function selectNode(node) {
  if(curStep>0) goToStep(0);
  selected=node;
  const tl={goal:'Core Target',channel:'Distribution Channel',tool:'Sales Tool',infra:'Infrastructure',outcome:'Outcome'};
  document.getElementById('pCat').textContent=tl[node.type];
  document.getElementById('pCat').style.color=COL[node.type];
  document.getElementById('pName').textContent=node.label.replace('\n',' ');
  document.getElementById('pDesc').textContent=node.desc;
  const se=document.getElementById('pStats');se.innerHTML='';
  (node.stats||[]).forEach(s=>{se.innerHTML+=`<div class="p-stat"><div class="p-stat-v">${s.v}</div><div class="p-stat-l">${s.l}</div></div>`;});
  const cl=document.getElementById('pConnList');cl.innerHTML='';
  const seen=new Set();
  edges.forEach(e=>{
    if(e.f===node.id&&NM[e.t]&&!seen.has(e.t)){seen.add(e.t);cl.innerHTML+=`<div class="panel-conn" style="color:${COL[NM[e.t].type]}">${NM[e.t].label.replace('\n',' ')}</div>`;}
    if(e.t===node.id&&NM[e.f]&&!seen.has(e.f)){seen.add(e.f);cl.innerHTML+=`<div class="panel-conn" style="color:${COL[NM[e.f].type]}">${NM[e.f].label.replace('\n',' ')}</div>`;}
  });
  document.getElementById('panel').classList.add('show');
}

function closePanel() { document.getElementById('panel').classList.remove('show'); selected=null; }

tCam.z = Math.min(W,H)/1500;
cam.z = tCam.z;
render();
</script>
</body>
</html>
