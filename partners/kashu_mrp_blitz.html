<style>

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }

<script>
function toggleCh(btn) {
  btn.classList.toggle('active');
}

function getChannels() {
  return [...document.querySelectorAll('.channel-toggle button.active')].map(b => b.dataset.ch);
}

function calcResiduals(merchants, avgVol) {
  // T2: 25% of net residuals. Net margin ~0.3% of volume
  const netMarginPct = 0.003;
  const t2Pct = 0.25;
  const monthlyPerMerchant = avgVol * netMarginPct * t2Pct;
  return {
    perMerchant: monthlyPerMerchant,
    mo3: merchants * 3 * monthlyPerMerchant,
    mo6: merchants * 6 * monthlyPerMerchant,
    mo12: merchants * 12 * monthlyPerMerchant,
    monthly6: merchants * 6 * monthlyPerMerchant, // monthly at month 6
    monthly12: merchants * 12 * monthlyPerMerchant
  };
}

function fmt(n) { return '$' + Math.round(n).toLocaleString(); }

// Live preview
document.getElementById('refPerMonth').addEventListener('input', updatePreview);
document.getElementById('avgVolume').addEventListener('input', updatePreview);
function updatePreview() {
  const m = parseInt(document.getElementById('refPerMonth').value) || 3;
  const v = parseInt(document.getElementById('avgVolume').value) || 60000;
  const r = calcResiduals(m, v);
  document.getElementById('prev3mo').textContent = fmt(r.mo3);
  document.getElementById('prev6mo').textContent = fmt(r.mo6);
  document.getElementById('prev12mo').textContent = fmt(r.mo12);
  document.getElementById('incomePreview').style.display = 'block';
}
updatePreview();

    why: "Your clients are paying 15-40% more than they should on processing fees and nobody's told them. Kashu guarantees better pricing in writing, handles the entire switch with zero business disruption, and can eliminate the cost entirely with a compliant surcharge program. Coming from you, it carries weight. One mention and your client saves real money. You earn monthly residuals. No liability, no complexity.",
    angle: "give your clients a cost savings recommendation that strengthens the relationship",
    objections: [
      { q: "I don't want to mix legal advice with vendor referrals.", a: "This isn't a vendor endorsement. It's the same as saying 'I know a good accountant' or 'I know a good commercial broker.' You're connecting them with a resource. That's what trusted advisors do." },
      { q: "Is there any liability exposure?", a: "Zero. You're making an introduction. We handle compliance, underwriting, onboarding, and support. You have no contractual relationship with the processing side. It's purely a referral." },
      { q: "My clients aren't going to switch processors based on my say-so.", a: "They don't have to take your word for it. We guarantee better rates in writing. All you do is open the door. The numbers close the deal." }
    ],
    avgRef: 2,
    idealVolume: 65000
  }
};

function generate() {
  const type = document.getElementById('partnerType').value;
  if (!type) { alert('Select a partner type.'); return; }

  const data = PARTNER_DATA[type];
  const name = document.getElementById('partnerName').value.trim() || 'there';
  const you = document.getElementById('yourName').value.trim() || 'John';
  const company = document.getElementById('partnerCompany').value.trim();
  const channels = getChannels();
  const refPerMonth = parseInt(document.getElementById('refPerMonth').value) || 3;
  const avgVol = parseInt(document.getElementById('avgVolume').value) || 60000;
  const r = calcResiduals(refPerMonth, avgVol);

  if (channels.length === 0) { alert('Select at least one channel.'); return; }

  const companyLine = company ? ` at ${company}` : '';

  // Build sequence
  const touches = [];

  // TOUCH 1: Cold open
  if (channels.includes('linkedin')) {
    touches.push({
      num: 1, channel: 'LinkedIn', timing: 'Day 1 -- Connection Request',
      subject: 'Connection Note',
      body: `${name === 'there' ? 'Hey' : 'Hey ' + name} -- saw you're ${data.title.split('/')[0].trim().toLowerCase() === 'iso' ? 'in the payments space' : 'a ' + data.title.split('/')[0].trim().toLowerCase()}${companyLine}. ${data.hook}. Quick question about a rev share opportunity if you're open to it. No pitch, just want to run something by you.`
    });
  }
  if (channels.includes('email')) {
    touches.push({
      num: touches.length + 1, channel: 'Email', timing: 'Day 1 -- Cold Email',
      subject: `Quick question${company ? ' for ' + company : ''}`,
      body: `${name === 'there' ? 'Hey' : name} --

${data.why}

No contracts, no minimums, no exclusivity on your end. Kashu pays ${refPerMonth >= 5 ? '25-50%' : '25%'} of net residuals monthly for as long as the merchants you refer keep processing.

Worth a 5 minute call to see if it's a fit?

${you}`
    });
  }

  // TOUCH 2: Value drop
  if (channels.includes('linkedin')) {
    touches.push({
      num: touches.length + 1, channel: 'LinkedIn', timing: 'Day 3 -- Follow-up DM (after connection accepted)',
      subject: 'Value Drop',
      body: `Thanks for connecting${name !== 'there' ? ' ' + name : ''}. Real quick -- I run revenue at Kashu, a payments company. Here's why I reached out: ${data.angle}.

The way it works: you make the intro, we guarantee the merchant lower rates in writing, handle the entire switch with zero downtime, and can even eliminate their processing fees entirely with surcharge. Your merchants get a better deal. You earn monthly residuals for as long as they process.

No selling, no closing, no onboarding on your end.

Want me to send over the one-pager?`
    });
  }
  if (channels.includes('email') && !channels.includes('linkedin')) {
    touches.push({
      num: touches.length + 1, channel: 'Email', timing: 'Day 3 -- Follow-up',
      subject: 'The math on this',
      body: `${name === 'there' ? 'Hey' : name} --

Wanted to put the numbers in front of you. If ${refPerMonth} of your clients switch to Kashu over the next few months:

Month 3: ${fmt(r.mo3)} earned
Month 6: ${fmt(r.mo6)} earned
Month 12: ${fmt(r.mo12)} earned

That's passive. No ongoing work. Residuals hit your account every month for as long as those merchants are processing.

Happy to walk through it in 5 if you're curious.

${you}`
    });
  }

  // TOUCH 3: Social proof / urgency
  if (channels.includes('text')) {
    touches.push({
      num: touches.length + 1, channel: 'Text', timing: 'Day 5 -- Text',
      subject: '',
      body: `Hey ${name !== 'there' ? name : ''} -- ${you} from Kashu. Quick one. We help merchants cut their processing costs, guaranteed in writing. Been working with ${data.title.toLowerCase().split('/')[0].trim()}s who want to pass that along to their clients and earn monthly residuals for the intro. No selling, just a warm connection. Worth 5 min?`
    });
  }
  if (channels.includes('email')) {
    touches.push({
      num: touches.length + 1, channel: 'Email', timing: 'Day 5 -- Residual Math Email',
      subject: `what this looks like for your clients`,
      body: `${name === 'there' ? 'Hey' : name} --

I'll keep this short. Here's what happens when a ${data.title.toLowerCase()} connects their merchants with Kashu:

Your merchants get guaranteed lower processing rates. We put it in writing before they sign anything. They go live without missing a day of business. With surcharge, their processing cost goes to zero.

On your side, you earn monthly residuals on every merchant you introduce. Here's the math if you refer ${refPerMonth} merchants/month at ${fmt(avgVol)} average volume:

3 months in: ${fmt(r.mo3)} earned
6 months in: ${fmt(r.mo6)} earned
12 months in: ${fmt(r.mo12)} earned

Your merchants save money. You earn for as long as they process. No cap, no expiration.

Let me know if you want the full breakdown.

${you}`
    });
  }

  // TOUCH 4: Breakup / direct
  if (channels.includes('linkedin')) {
    touches.push({
      num: touches.length + 1, channel: 'LinkedIn', timing: 'Day 8 -- Final DM',
      subject: 'Breakup Message',
      body: `${name !== 'there' ? name + ' -- ' : ''}last one from me on this. If the timing's off, no worries at all. But if you ever have a client overpaying on processing and want an easy win to hand them, just shoot me a message. The referral program's always open and the residuals are real. Appreciate your time either way.`
    });
  }
  if (channels.includes('email')) {
    touches.push({
      num: touches.length + 1, channel: 'Email', timing: 'Day 8 -- Breakup Email',
      subject: 'Last one from me',
      body: `${name === 'there' ? 'Hey' : name} --

Not going to keep hitting you up on this. If the timing's wrong, totally get it.

But if you ever have a client complaining about processing fees or you're looking at a P&L and see they're paying 2.7%+ on card transactions, just know you have a standing offer to earn residuals by sending them our way.

No pressure, no expiration. Just an open door.

${you}`
    });
  }

  // TOUCH 5: Call script
  if (channels.includes('call')) {
    touches.push({
      num: touches.length + 1, channel: 'Call', timing: 'Day 4-6 -- Phone Call Script',
      subject: 'Call Script',
      body: `[OPENER]
"Hey ${name !== 'there' ? name : ''}, this is ${you} with Kashu. I know you're busy so I'll be quick. We're a payments company and we've been building out a referral program specifically for ${data.title.toLowerCase()}s. You probably get pitches all the time so I'm not going to give you one. I just want to ask you one question."

[THE QUESTION]
"Do you ever see your clients' processing statements or hear them complain about fees?"

[IF YES]
"That's exactly why I'm calling. Most businesses are paying 2.6-2.9% when they should be paying 2.2%. All you'd have to do is make a quick intro. We handle the call, the close, the onboarding, everything. And you earn monthly residuals for as long as they process with us."

[THE MATH]
"Just to put numbers on it -- if you send us ${refPerMonth} merchants over the next few months doing about ${fmt(avgVol)} each in volume, you'd be earning about ${fmt(refPerMonth * 12 * r.perMerchant)} a month in residuals by end of year. Passive. No ongoing work."

[CLOSE]
"I can send you a one-pager that breaks down the whole thing. Takes 2 minutes to read. Want me to shoot it over?"

[IF HESITANT]
"No commitment needed. Just take a look at the numbers and see if it makes sense. If it does, great. If not, no hard feelings."

[OBJECTION: "I don't do referrals"]
"Totally get it. But this isn't really a referral in the traditional sense. You're not endorsing us or putting your name on anything. You're just saying 'hey, this person can save you money on processing.' We do the rest."

[OBJECTION: "Send me info"]
"Absolutely. I'll shoot over the one-pager right now. What's the best email? And just so I send the right version, are most of your clients retail, service-based, or restaurants?"`,
    });
  }

  // Render
  let html = `
    <div class="output-header">
      <div class="kashu-logo"><div class="logo-dot"></div> Kashu</div>
      <h2>MRP Recruiting Sequence: ${data.title}</h2>
      <p>${name !== 'there' ? name : 'Prospect'}${companyLine} -- ${channels.length}-channel, ${touches.length}-touch sequence</p>
      <div class="meta">
        ${channels.map(c => `<span class="meta-tag">${c}</span>`).join('')}
        <span class="meta-tag">${touches.length} touches</span>
      </div>
    </div>

    <div class="earnings-box">
      <h3>Residual Income Projection for This Partner</h3>
      <div class="earnings-grid">
        <div class="earn-stat"><div class="val">${fmt(r.mo3)}</div><div class="lbl">3 Month Earnings</div></div>
        <div class="earn-stat"><div class="val">${fmt(r.mo6)}</div><div class="lbl">6 Month Earnings</div></div>
        <div class="earn-stat"><div class="val" style="color:var(--green-bright)">${fmt(r.mo12)}</div><div class="lbl">12 Month Earnings</div></div>
      </div>
      <p style="text-align:center;color:var(--teal-muted);font-size:12px;margin-top:14px;">Based on ${refPerMonth} referrals/month at ${fmt(avgVol)} avg volume -- T2 (25% net residuals)</p>
    </div>
  `;

  touches.forEach((t, i) => {
    html += `
      <div class="touch-card">
        <span class="touch-badge">Touch ${t.num} <span class="touch-channel">${t.channel}</span></span>
        <h3>${t.subject || t.channel + ' Message'}</h3>
        <div class="timing">${t.timing}</div>
        ${t.subject && t.channel === 'Email' ? `<div style="font-size:12px;color:var(--teal-muted);margin-bottom:8px;font-weight:600;">Subject: ${t.subject}</div>` : ''}
        <div class="body">${t.body}</div>
        <button class="copy-btn" onclick="copyTouch(this, ${i})">Copy</button>
      </div>
    `;
  });

  // Objections
  html += `
    <div class="objection-section">
      <h3>Objection Handling -- ${data.title}</h3>
      ${data.objections.map(o => `
        <div class="objection">
          <div class="q">"${o.q}"</div>
          <div class="a">${o.a}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Copy all button
  html += `
    <div style="text-align:center;margin-top:20px;">
      <button class="copy-btn" onclick="copyAll()" style="padding:12px 32px;font-size:14px;">Copy Entire Sequence</button>
    </div>
  `;

  document.getElementById('output').innerHTML = html;
  document.getElementById('output').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });

  window._touches = touches;
  window._data = data;
}

function copyTouch(btn, idx) {
  const t = window._touches[idx];
  let text = '';
  if (t.channel === 'Email') text = `Subject: ${t.subject}\n\n${t.body}`;
  else text = t.body;
  navigator.clipboard.writeText(text);
  btn.textContent = 'Copied';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
}

function copyAll() {
  let full = `MRP RECRUITING SEQUENCE: ${window._data.title}\n${'='.repeat(50)}\n\n`;
  window._touches.forEach(t => {
    full += `--- TOUCH ${t.num}: ${t.channel} (${t.timing}) ---\n`;
    if (t.subject && t.channel === 'Email') full += `Subject: ${t.subject}\n\n`;
    full += `${t.body}\n\n`;
  });
  full += `\n--- OBJECTION HANDLING ---\n\n`;
  window._data.objections.forEach(o => {
    full += `Q: "${o.q}"\nA: ${o.a}\n\n`;
  });
  navigator.clipboard.writeText(full);
  event.target.textContent = 'Copied All';
  event.target.classList.add('copied');
  setTimeout(() => { event.target.textContent = 'Copy Entire Sequence'; event.target.classList.remove('copied'); }, 2000);
}
</script>

</body>
</html>
