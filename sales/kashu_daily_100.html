function generateBatch() {
  const today = new Date().toISOString().split('T')[0];
  const messages = [];

  // 70 merchant messages

    const vert = MERCHANT_VERTICALS[i % MERCHANT_VERTICALS.length];
    const bizType = vert.types[Math.floor(Math.random() * vert.types.length)];
    const isLinkedIn = i % 5 === 4; // every 5th is LinkedIn
    const isText = i % 5 === 3; // every 5th group has a text

    let channel, subject, body;

    if (isLinkedIn) {
      channel = "LinkedIn";
      subject = "";
      let tmpl = MRP_LINKEDIN[Math.floor(Math.random() * MERCHANT_LINKEDIN.length)];
      // use merchant linkedin templates
      tmpl = MERCHANT_LINKEDIN[Math.floor(Math.random() * MERCHANT_LINKEDIN.length)];
      body = fillTemplate(tmpl, vert, bizType);
    } else {
      channel = "Email";
      subject = fillTemplate(MERCHANT_SUBJECTS[Math.floor(Math.random() * MERCHANT_SUBJECTS.length)], vert, bizType);
      body = fillTemplate(MERCHANT_EMAILS[Math.floor(Math.random() * MERCHANT_EMAILS.length)], vert, bizType);
    }

    messages.push({
      id: i + 1,
      type: "merchant",
      vertical: vert.name,
      bizType: bizType,
      channel: channel,
      subject: subject,
      body: body.trim(),
      sent: false
    });
  }

  // 30 MRP messages

    const partner = MRP_TYPES[i % MRP_TYPES.length];
    const title = partner.titles[Math.floor(Math.random() * partner.titles.length)];

    let channel, subject, body;

    if (isLinkedIn) {
      channel = "LinkedIn";
      subject = "";
      const tmpl = MRP_LINKEDIN[Math.floor(Math.random() * MRP_LINKEDIN.length)];
      body = fillMRPTemplate(tmpl, partner);
    } else {

      subject = fillMRPTemplate(MRP_SUBJECTS[Math.floor(Math.random() * MRP_SUBJECTS.length)], partner);
      body = fillMRPTemplate(MRP_EMAILS[Math.floor(Math.random() * MRP_EMAILS.length)], partner);
    }

    messages.push({
      id: 71 + i,
      type: "mrp",

    });
  }

  // Shuffle to mix merchant and MRP
  for (let i = messages.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [messages[i], messages[j]] = [messages[j], messages[i]];
  }

  // Re-number
  messages.forEach((m, idx) => m.id = idx + 1);

  // Save to localStorage
  const batch = { date: today, messages: messages };
  localStorage.setItem('kashu_daily_100', JSON.stringify(batch));

  // Update streak
  updateStreak(today);

  renderMessages();
}

function fillTemplate(tmpl, vert, bizType) {
  return tmpl
    .replace(/\{vertical\}/g, vert.name)
    .replace(/\{bizType\}/g, bizType)
    .replace(/\{currentProcessor\}/g, vert.currentProcessor)
    .replace(/\{painPoint\}/g, vert.painPoint)
    .replace(/\{savingsAngle\}/g, vert.savingsAngle)
    .replace(/\{surchargeAngle\}/g, vert.surchargeAngle)
    .replace(/\{avgVolume\}/g, vert.avgVolume);
}

function fillMRPTemplate(tmpl, partner) {
  return tmpl
    .replace(/\{hook\}/g, partner.hook)
    .replace(/\{pitch\}/g, partner.pitch)
    .replace(/\{residualStory\}/g, partner.residualStory)
    .replace(/\{partnerType\}/g, partner.name);
}

// =============================================
// RENDERING
// =============================================
let currentFilter = 'all';

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.control-btn[data-filter]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMessages();
}

function renderMessages() {
  const data = JSON.parse(localStorage.getItem('kashu_daily_100') || 'null');
  if (!data || !data.messages) {
    document.getElementById('message-list').innerHTML = '<div class="empty-state">Hit "Generate Today\'s 100" to build your daily outbound batch.</div>';
    updateCounts([], 0);
    return;
  }

  let msgs = data.messages;
  if (currentFilter === 'merchant') msgs = msgs.filter(m => m.type === 'merchant');
  else if (currentFilter === 'mrp') msgs = msgs.filter(m => m.type === 'mrp');
  else if (currentFilter === 'unsent') msgs = msgs.filter(m => !m.sent);

  const html = msgs.map(m => `
    <div class="message-card ${m.sent ? 'sent' : ''}" id="card-${m.id}">
      <div class="message-meta">
        <div class="message-num">${m.id}</div>
        <div class="message-type ${m.type}">${m.type === 'merchant' ? 'Merchant' : 'MRP'}</div>
        <div class="message-vertical">${m.vertical} — ${m.bizType}</div>
        <div class="message-channel">${m.channel}</div>
      </div>
      ${m.subject ? `<div class="message-subject">Subject: ${m.subject}</div>` : ''}
      <div class="message-body">${escapeHtml(m.body)}</div>
      <div class="message-actions">
        <button class="msg-btn copy-btn" onclick="copyMessage(${m.id})">Copy</button>
        <button class="msg-btn sent-btn" onclick="markSent(${m.id})">${m.sent ? 'Undo' : 'Mark Sent'}</button>
      </div>
    </div>
  `).join('');

  document.getElementById('message-list').innerHTML = html || '<div class="empty-state">All caught up. Every message sent.</div>';
  updateCounts(data.messages, data.messages.filter(m => m.sent).length);
}

function updateCounts(messages, sentCount) {
  const total = messages.length || 100;
  const remaining = total - sentCount;
  const pct = total > 0 ? Math.round((sentCount / total) * 100) : 0;

  document.getElementById('sent-count').textContent = sentCount;
  document.getElementById('remaining-count').textContent = remaining;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${sentCount} / ${total}`;
  document.getElementById('progress-pct').textContent = pct + '%';

  // Streak
  const streak = parseInt(localStorage.getItem('kashu_daily_streak') || '0');
  document.getElementById('streak-count').textContent = streak;
}

function updateStreak(today) {
  const lastDate = localStorage.getItem('kashu_daily_last_date');
  let streak = parseInt(localStorage.getItem('kashu_daily_streak') || '0');

  if (lastDate === today) return; // already generated today

  const yesterday = new Date(new Date(today).getTime() - 86400000).toISOString().split('T')[0];
  if (lastDate === yesterday) {
    streak++;
  } else {
    streak = 1;
  }

  localStorage.setItem('kashu_daily_streak', streak.toString());
  localStorage.setItem('kashu_daily_last_date', today);
}

// =============================================
// ACTIONS
// =============================================
function copyMessage(id) {
  const data = JSON.parse(localStorage.getItem('kashu_daily_100'));
  const msg = data.messages.find(m => m.id === id);
  if (!msg) return;

  const text = msg.subject ? `Subject: ${msg.subject}\n\n${msg.body}` : msg.body;
  navigator.clipboard.writeText(text).then(() => {
    const card = document.getElementById('card-' + id);
    const btn = card.querySelector('.copy-btn');
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function markSent(id) {
  const data = JSON.parse(localStorage.getItem('kashu_daily_100'));
  const msg = data.messages.find(m => m.id === id);
  if (!msg) return;
  msg.sent = !msg.sent;
  localStorage.setItem('kashu_daily_100', JSON.stringify(data));
  renderMessages();
}

function copyAllUnsent() {
  const data = JSON.parse(localStorage.getItem('kashu_daily_100'));
  if (!data) return;
  const unsent = data.messages.filter(m => !m.sent);
  const text = unsent.map((m, i) => {
    let out = `--- #${m.id} | ${m.type.toUpperCase()} | ${m.vertical} | ${m.channel} ---\n`;
    if (m.subject) out += `Subject: ${m.subject}\n`;
    out += `\n${m.body}\n`;
    return out;
  }).join('\n');
  navigator.clipboard.writeText(text);
}

function exportCSV() {
  const data = JSON.parse(localStorage.getItem('kashu_daily_100'));
  if (!data) return;
  const header = 'Number,Type,Vertical,Business Type,Channel,Subject,Body,Sent\n';
  const rows = data.messages.map(m =>
    `${m.id},"${m.type}","${m.vertical}","${m.bizType}","${m.channel}","${csvEscape(m.subject)}","${csvEscape(m.body)}","${m.sent}"`
  ).join('\n');

  const blob = new Blob([header + rows], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kashu_daily_100_${data.date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(str) {
  return (str || '').replace(/"/g, '""').replace(/\n/g, ' ');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// =============================================
// INIT — auto-load today's batch if it exists
// =============================================
(function() {
  const data = JSON.parse(localStorage.getItem('kashu_daily_100') || 'null');
  const today = new Date().toISOString().split('T')[0];
  if (data && data.date === today) {
    renderMessages();
  } else {
    updateCounts([], 0);
    const streak = parseInt(localStorage.getItem('kashu_daily_streak') || '0');
    document.getElementById('streak-count').textContent = streak;
  }
})();
</script>
