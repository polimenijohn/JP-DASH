<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kashu — Credit-to-Cash Outreach Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark:   #0b5147; --mid:  #397168; --muted: #93adaa;
    --green:  #01de8f; --light1: #8de6c6; --light2: #d5eae3;
    --light3: #e1fea1; --bg: #f4f9f8; --white: #ffffff;
    --text:   #1a2e2b; --sub:  #4a6360; --border: #c8dbd8;
    --red:    #e05252;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--dark); padding: 18px 32px; display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 36px; height: 36px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: var(--dark); }
  header h1 { color: var(--white); font-size: 20px; font-weight: 600; }
  header span { color: var(--muted); font-size: 14px; margin-left: auto; }
  .layout { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 62px); }
  @media(max-width:860px){ .layout { grid-template-columns: 1fr; } }
  .sidebar { background: var(--white); border-right: 1px solid var(--border); padding: 28px; overflow-y: auto; }
  .sidebar h2 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 20px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--sub); }
  .field-group input, .field-group select {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    background: var(--white); width: 100%; transition: border 0.2s;
  }
  .field-group input:focus, .field-group select:focus { outline: none; border-color: var(--mid); }
  .divider { height: 1px; background: var(--light2); margin: 20px 0; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--mid); margin-bottom: 12px; }
  .generate-btn {
    width: 100%; padding: 14px; background: var(--dark); color: var(--white);
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 4px;
  }
  .generate-btn:hover { background: var(--mid); }
  .output-area { padding: 32px; overflow-y: auto; }
  .placeholder-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; color: var(--muted); text-align: center; }
  .placeholder-msg .pm-icon { font-size: 48px; margin-bottom: 16px; }
  .placeholder-msg p { font-size: 15px; }

  /* One Pager */
  .onepager {
    background: var(--white); border-radius: 16px; border: 1px solid var(--border);
    overflow: hidden; max-width: 760px; margin-bottom: 24px;
  }
  .op-hero {
    background: var(--dark); padding: 36px 40px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .op-hero-left .op-badge {
    background: rgba(1,222,143,0.2); color: var(--green);
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(1,222,143,0.3);
    display: inline-block; margin-bottom: 12px;
  }
  .op-hero-left h1 { font-size: clamp(20px, 3vw, 28px); font-weight: 800; color: var(--white); line-height: 1.2; max-width: 480px; }
  .op-hero-left .op-sub { font-size: 15px; color: var(--muted); margin-top: 8px; line-height: 1.6; max-width: 440px; }
  .op-hero-right { text-align: right; }
  .op-hero-right .op-name { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .op-hero-right .op-company { font-size: 18px; font-weight: 700; color: var(--white); }

  .op-body { padding: 36px 40px; }
  .op-pain {
    background: #fff8f2; border-left: 4px solid var(--red);
    border-radius: 0 8px 8px 0; padding: 16px 20px; margin-bottom: 28px;
  }
  .op-pain .op-pain-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--red); margin-bottom: 6px; }
  .op-pain p { font-size: 14px; color: #5a2020; line-height: 1.6; }

  .op-points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
  @media(max-width:600px){ .op-points-grid { grid-template-columns: 1fr; } }
  .op-point { background: var(--light2); border-radius: 10px; padding: 16px; }
  .op-point .opp-icon { font-size: 20px; margin-bottom: 8px; }
  .op-point .opp-title { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .op-point .opp-text { font-size: 13px; color: var(--sub); line-height: 1.5; }

  .op-how { margin-bottom: 28px; }
  .op-how h3 { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .op-steps { display: flex; gap: 0; }
  @media(max-width:560px){ .op-steps { flex-direction: column; } }
  .op-step { flex: 1; display: flex; gap: 12px; align-items: flex-start; padding-right: 16px; }
  .op-step:last-child { padding-right: 0; }
  .op-step-n { width: 28px; height: 28px; background: var(--dark); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .op-step-text strong { font-size: 13px; font-weight: 700; color: var(--dark); display: block; margin-bottom: 2px; }
  .op-step-text span { font-size: 12px; color: var(--sub); }

  .op-cta {
    background: var(--dark); border-radius: 10px; padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .op-cta p { font-size: 15px; font-weight: 600; color: var(--white); }
  .op-cta-contact { text-align: right; }
  .op-cta-contact .cta-name { font-size: 14px; font-weight: 700; color: var(--green); }
  .op-cta-contact .cta-info { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Email Card */
  .email-card {
    background: var(--white); border-radius: 16px; border: 1px solid var(--border);
    padding: 28px; max-width: 760px; margin-bottom: 24px; position: relative;
  }
  .email-card h3 { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 16px; }
  .email-meta { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .email-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .email-meta-item span:first-child { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--sub); }
  .email-meta-item span:last-child { font-size: 14px; font-weight: 600; color: var(--text); }
  .email-body { background: var(--bg); border-radius: 8px; padding: 18px; font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
  .copy-btn { position: absolute; top: 20px; right: 20px; background: var(--light2); border: none; color: var(--dark); padding: 6px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .copy-btn:hover { background: var(--light1); }

  .actions-row { display: flex; gap: 12px; flex-wrap: wrap; max-width: 760px; }
  .btn { padding: 11px 22px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--green); color: var(--dark); }
  .btn-primary:hover { background: #00c97e; }
  .btn-outline { background: transparent; color: var(--dark); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--mid); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--dark); color: var(--white); padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; }

  @media print {
    header, .sidebar, .actions-row, .email-card, .copy-btn { display: none !important; }
    .layout { display: block; }
    .output-area { padding: 0; }
    .onepager { box-shadow: none; border: none; }
  }

  .opp-icon:empty, .kill-icon:empty, .wo-icon:empty, .cc-icon:empty, .wf-header-icon:empty, .upload-icon:empty, .pn-item .pn-icon:empty, .ty-icon:empty, .pm-icon:empty { display:none; }

  .chevron::after, .touch-chevron::after { content: "\25BC"; font-size: 10px; }
  .check::after { content: "\2713"; font-weight: 700; }
  .setup-check.checked::after { content: "\2713"; }
</style>
</head>

function copyEmail() {
  const subj = document.getElementById('emailSubject').textContent;
  const body = document.getElementById('emailBody').textContent;
  const full = `Subject: ${subj}\n\n${body}`;
  navigator.clipboard.writeText(full).then(() => showToast('Email copied.'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
